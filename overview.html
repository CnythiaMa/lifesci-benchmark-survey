    th { background: #f6f8fa; padding: 8px 10px; text-align: left; border-bottom: 1.5px solid #d0d7de; white-space: nowrap; font-weight: 600; }
    td { padding: 7px 10px; border-bottom: 1px solid #eaecef; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f6f8fa; }
    tr[data-hidden="true"] { display: none; }

    .tag-llm       { background: #fbefff; color: #8250df; border: 1px solid #e2c5ff; }

    td.task { max-width: 180px; }
    td.scale { max-width: 130px; font-size: 11px; color: #57606a; }
    td.ref a { color: #0969da; text-decoration: none; }
    td.ref a:hover { text-decoration: underline; }

    .domain-section.all-hidden { display: none; }

// 领域元数据
const DOMAINS = {
  "01": "🧬 01 蛋白质生物学",
  "02": "💊 02 药物发现",
  "03": "🔬 03 基因组学",
  "04": "🏥 04 临床医学",
  "05": "🖼️ 05 多模态",
  "06": "📝 06 生物医学NLP",
  "07": "🤖 07 智能体 & 跨领域综合",
};

// ─── 渲染 ──────────────────────────────────────────────────────────────────
function buildTable() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  for (const [domainKey, domainTitle] of Object.entries(DOMAINS)) {
    const rows = DATA.filter(d => d.domain === domainKey);
    const section = document.createElement("div");
    section.className = "domain-section";
    section.dataset.domain = domainKey;

    const title = document.createElement("div");
    title.className = "domain-title";
    title.textContent = domainTitle;
    section.appendChild(title);

    const table = document.createElement("table");
    table.innerHTML = `<thead><tr>
      <th>Benchmark</th><th>年份</th><th>任务</th><th>规模</th><th>指标</th><th>SOTA</th><th>参考</th><th>类别</th>
    </tr></thead>`;
    const tbody = document.createElement("tbody");

    for (const b of rows) {
      const tr = document.createElement("tr");
      tr.dataset.category = b.category;
      const tagClass = b.category === "specialist" ? "tag-specialist" : "tag-llm";
      const tagText  = b.category === "specialist" ? "精调专用" : "LLM / Agent";
      tr.innerHTML = `
        <td><b>${b.name}</b></td>
        <td>${b.year}</td>
        <td class="task">${b.task}</td>
        <td class="scale">${b.scale}</td>
        <td>${b.metric}</td>
        <td class="sota">${b.sota}</td>
        <td class="ref">${b.refUrl ? `<a href="${b.refUrl}" target="_blank">${b.refText}</a>` : b.refText}</td>
        <td><span class="tag ${tagClass}">${tagText}</span></td>
      `;
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    section.appendChild(table);
    main.appendChild(section);
  }
}

// ─── 筛选 ──────────────────────────────────────────────────────────────────
let currentFilter = "all";

function filter(cat) {
  currentFilter = cat;

  document.getElementById("btn-all").className  = "btn" + (cat === "all"        ? " active" : "");
  document.getElementById("btn-spec").className = "btn" + (cat === "specialist" ? " active-green" : "");
  document.getElementById("btn-llm").className  = "btn" + (cat === "llm"        ? " active-purple" : "");

  let total = 0;
  for (const section of document.querySelectorAll(".domain-section")) {
    let sectionVisible = 0;
    for (const tr of section.querySelectorAll("tbody tr")) {
      const show = (cat === "all" || tr.dataset.category === cat);
      tr.dataset.hidden = show ? "false" : "true";
      if (show) { sectionVisible++; total++; }
    }
    section.classList.toggle("all-hidden", sectionVisible === 0);
  }

  document.getElementById("count").textContent = total;
  document.getElementById("no-result").style.display = (total === 0) ? "block" : "none";
}

// ─── 初始化 ────────────────────────────────────────────────────────────────
buildTable();
filter("all");
</script>

<div id="main"></div>
<div id="no-result">当前筛选条件下无结果</div>
