# 生命科学 AI Benchmark 全景图

## 🧬 蛋白质生物学

### 蛋白质结构预测
- **CASP14** (2020)
  - SOTA: AlphaFold2 — GDT_TS 92.4 / sum-z 244
- **CASP15** (2022)
  - SOTA: AF2变体 TM-score ~0.92；AF-Multimer DockQ ~0.60
- **CAMEO**（持续自动评测）
  - SOTA: AF2-based 平均 lDDT > 0.85
- **CATH / SCOPe**（结构分类）
  - SOTA: Foldseek / TM-align
- **1.4M 结构基准集** (2025)
  - SOTA: 140万经质量检查结构，可更新测试集

### 蛋白质功能与适应性
- **ProteinGym** (2023, NeurIPS)
  - 2.7M突变 / 217 assays
  - SOTA: Tranception L — 中位Spearman ρ 0.46
- **FLIP** (2021)
  - 4任务适应性预测（AAV/GFP/GB1/热稳定性）
  - SOTA: ESM2微调 — GB1 ~0.75 / AAV ~0.85
- **FLIP2** (2026，扩展版)
  - SOTA: 竞赛进行中，暂无公开SOTA
- **PEER** (2022)
  - 多任务统一评测（15数据集×5类）
  - SOTA: ESM2 / ProtTrans — AUC ~0.85
- **CAFA6** (2026, Kaggle竞赛)
  - GO功能注释预测
  - SOTA: 竞赛进行中，暂无公开SOTA

### 蛋白质–蛋白质互作 PPI
- **PRING** (2024–2025)
  - 21,484蛋白，186,818互作对，多物种无泄露切分
  - SOTA: 最优图模型 AUROC ~0.85（严格切分）
- **SHS27k / SHS148k** (2019–2021)
  - SOTA: KSGPPI Accuracy 88.96%（⚠️ 含数据泄露警告）
- **Human PPI 26法社区评测** (2023)
  - SOTA: 严格物种切分 AUROC ~0.72 vs 随机切分 ~0.92

### 蛋白质语言模型 PLM 评测
- **多任务PLM评测** (2024)
  - 对比 ESM2 / ProtT5 / Ankh / SaProt 等
  - SOTA: ESM2-3B — 定位AUC 0.90 / 稳定性Spearman 0.67
- **DARKIN** (2024)
  - 零样本黑暗激酶-磷酸化位点分类
  - SOTA: 零样本AUC ~0.75；微调可达 ~0.88

## 💊 药物发现

### ADMET 预测
- **TDC** (持续，22任务标准化)
  - SOTA: ADMET-AI — AUROC ~0.871
- **PharmaBench** (2024)
  - SOTA: LLM增强SMILES — AUROC ~0.86
- **Tox21 Challenge**
  - SOTA: DeepTox — AUC ~0.85–0.88

### 药物–靶标互作 DTI
- **Davis** (Kd亲和力)
  - SOTA: 注意力DTA — CI 0.893
- **KIBA** (复合评分)
  - SOTA: 最优模型 CI ~0.901
- **BindingDB** (>991K IC50对)
  - SOTA: 二分类AUROC ~0.99（结构感知）

### 分子性质预测
- **MoleculeNet** (17+数据集)
  - SOTA: Uni-Mol/GROVER — HIV 0.82 / BBBP 0.91
- **TDC** (66数据集)
  - SOTA: ChemBERTa / GROVER

### 分子生成
- **MOSES** (2D生成)
  - SOTA: Validity ~99.9%；REINVENT均分 0.79
- **GuacaMol** (20优化基准)
  - SOTA: REINVENT 均分 0.79
- **MolScore** (多目标统一框架)
  - SOTA: 综合分 ~0.72
- **TOMG-Bench** (文本引导生成)
  - SOTA: 微调Llama3.1 — 46.5%优势
- **3D分子生成** (DiffSBDD / TargetDiff)
  - SOTA: Validity 99% / RMSD ~0.35 Å

## 🔬 基因组学 & 单细胞

### 变异效应预测
- **ClinVar + gnomAD**
  - SOTA: AlphaGenome — AUC 0.78–0.91（剪接预测）
- **AlphaGenome 26-benchmark Suite** (2025)
  - SOTA: AlphaGenome（DeepMind, 2025）
- **CAGI**（社区挑战赛）
  - SOTA: Ensemble 模型

### 基因表达预测
- **Enformer**（调控序列→表达）
  - SOTA: EPInformer — Pearson r 0.875–0.891
- **scRNA扰动预测**（Norman / Replogle）
  - ⚠️ SOTA: PCA baseline优于所有基础模型（Nature Methods 2025）

### 调控元件预测
- **Nucleotide Transformer v2**（18任务）
  - SOTA: 剪接位点 F1 ~0.92
- **SegmentNT**（基因组分割）
  - SOTA: SegmentNT — Jaccard ~0.87
- **GFMBench-API**（28数据集）
  - SOTA: 多模型集成

### 单细胞 RNA-seq
- **scBench**（394问题 / 9任务，2026）
  - SOTA: GPT-4o + 专用Agent — 65%任务成功率
- **scSuperAnnotator**
  - SOTA: scGPT fine-tuned

### 空间转录组
- **HESCAPE**（组织切片检索）
  - SOTA: R@1 ~55%（跨模态对齐模型）
- **图像→基因表达**（11法比较）
  - SOTA: Pearson r ~0.45（最优方法）

## 🏥 临床与医学

### 医学问答 QA
- **MedQA**（USMLE 4选1）
  - SOTA: Med-Gemini — 91.1%；GPT-4o ~90%
- **MedMCQA**（印度医学考试）
  - SOTA: GPT-4级 ~70–75%
- **PubMedQA**（文献推理）
  - SOTA: OpenMedLM / Yi-34B — 77.3%
- **BioASQ**（持续至2025）
  - SOTA: 是非题 >80%；2025新增MultiClinSum
- **MMLU 医学子集**（~1400题）
  - SOTA: GPT-4.1 ~90%；Claude 3 Opus 86.8%
- **MedXpertQA**（专家级，2025 ICML）
  - ⚠️ SOTA: 顶尖LLM 45–52%（人类 87%）

### 临床 NLP / EHR 操作
- **n2c2系列**（去标识/关系/概念）
  - SOTA: 微调BERT — 去标识F1 ~99%
- **MedAgentBench**（EHR Agent，NEJM AI 2025）
  - SOTA: 最佳Agent — 70%任务完成率
- **MedArena**（临床医生偏好，2025）
  - SOTA: Gemini 2.0 Flash Thinking #1
- **MedS-Bench**（122类任务，2025）
  - SOTA: GPT-4综合最优；平均 ~68%
- **CSEDB**（30指标/26科室，2025）
  - SOTA: 平均57.2%；高风险场景 -13.3%
- **DRAGON**（临床NLP自动标注，2025）
  - SOTA: 最优pipeline F1 ~85%（文档分类）
- **GLiNER-biomed**（开放域NER，2025）
  - SOTA: 零样本 F1 ~85%，可泛化新实体

### 疾病诊断 / ICD 编码
- **MAX-EVAL-11**（ICD-11编码）
  - SOTA: Claude 4 Sonnet — 43.3%；Gemini 2.5 Flash 34.1%
- **MedBench v4**（中文医学综合，2025）
  - SOTA: 最优中文医学模型 Accuracy ~75%

### 综合医学 LLM 评测
- **MedHELM**（斯坦福，持续更新）
  - SOTA: GPT-4o / Claude-3.5-Sonnet领先
- **HealthBench**（OpenAI，2025）
  - SOTA: GPT-4o ~72 / Claude-3.5 ~70
- **Open Medical-LLM Leaderboard**（HF）
  - SOTA: 当前榜首平均 ~80%
- **Biomni-Eval1**（罕见病/CRISPR，2025）
  - SOTA: Biomni Agent（Stanford）综合最优

## 🖼️ 多模态

### 医学图像 + 文本 VQA
- **PathMMU**（病理切片问答）
  - ⚠️ SOTA: 专科病理VLM — 68%（人类 ~90%）
- **OmniMedVQA**（12模态，CVPR 2024）
  - SOTA: 专科多模态模型 — 79%
- **MIMIC-CXR / EHRXQA**（胸片+EHR）
  - SOTA: 多模态融合 — ~80%
- **GEMeX**（可定位CXR VQA，ICCV 2025）
  - SOTA: 准确率 ~72% / 定位IoU ~0.45

### 生物协议理解
- **BioProBench**（实验操作步骤，2025）
  - SOTA: 专门微调 ~70%；多步推理仍具挑战

### 多模态基础模型
- **15M Image-Text Biomedical FM** (2024)
  - SOTA: 零样本 ~78% / 跨模态检索R@1 ~65%
- **MULAN**（序列+结构多模态，2025）
  - SOTA: 联合模态 AUC 0.91
- **MedGemma 1.5**（Google，2025）
  - SOTA: 胸片分类 AUC 0.94

## 📝 生物医学 NLP

### 命名实体识别 NER
- **BC5CDR**（化学品/疾病）
  - SOTA: PubMedBERT fine-tuned — F1 ~90%
- **NCBI Disease**
  - SOTA: BERT微调 — F1 ~90%
- **BC2GM**（基因/蛋白质）
  - SOTA: BioNER BERT — F1 ~84–88%
- **JNLPBA**（5类生物实体）
  - SOTA: 微调模型 — F1 ~78–82%
- **BioRED**（多实体/文档级，2022）
  - SOTA: 文档级RE F1 ~72%

### 关系抽取 RE
- **ChemProt**（化学–蛋白质关系）
  - SOTA: 微调PubMedBERT — F1 ~82%
- **DDI**（药物–药物相互作用）
  - SOTA: 微调模型 — F1 ~80–85%
- **GAD**（基因–疾病关联）
  - SOTA: BERT微调 — F1 ~87%

### 统一 NLP 套件
- **BLURB**（13数据集，2020）
  - SOTA: PubMedBERT — 综合分 82.91
- **BigBIO**（100+数据集，NeurIPS 2022）
  - 76个NER数据集，12任务
- **BioNLP Benchmark Suite**（Nat.Commun. 2025）
  - SOTA: 微调NER/RE F1 ~88%；LLM开放QA ~77%
- **BIOSSES**（语义相似度）
  - SOTA: BioALBERT — Pearson r ~0.90
- **MedNLI**（临床NLI）
  - SOTA: ClinicalBERT — Accuracy ~82%

### 生物信息学推理 / 编程
- **Bioinfo-Bench**（知识推理）
  - SOTA: GPT-4 — >80%（多选）
- **BioCoder**（生物信息编程）
  - SOTA: GPT-4 — Pass@1 ~42%
- **BioinformaticsBench**（9子领域，2024）
  - SOTA: GPT-4 ~68%；工具调用是关键瓶颈
- **Eubiota**（微生物组推理，2026）
  - SOTA: Eubiota系统 87.7%；超GPT-5.1约10.4%

  - SOTA: GPT-4o Agent — 65%任务成功率

  - SOTA: GPT-4o — 70%任务完成率
